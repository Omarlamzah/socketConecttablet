<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page 6</title>
</head>
<style>
    #para{text-align: center;    margin-top: 50vh;}
</style>
<body>
    

<h1 id="para">page </h1>


</body>
<script src="/socket.io/socket.io.js"></script>
<script>const socket =window.io()
    var para=document.getElementById("para")

socket.on("datatopage",info=>{

para.innerText=info[5][0];
para.style.fontSize=info[5][1]+"px";
})

socket.on("dataretate",retation=>{
    if(retation[0]==6){
       para.style.transform="rotate("+retation[1]+ "deg)";
    }   
})

socket.on("fontsize",fontsize=>{
    
    if(fontsize[0]==6){
        para.style.fontSize=fontsize[1]+"px";
    }
    
})

</script>

</html>
